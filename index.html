<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Stopwatch</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Orbitron', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#0a0f1c;
    color:#fff;
    overflow-x:hidden;
}

body::before,
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.6;
    animation: float 10s infinite alternate ease-in-out;
    z-index:-1;
}

body::before{
    background:#00f5ff;
    top:-150px;
    left:-150px;
}

body::after{
    background:#ff00c8;
    bottom:-150px;
    right:-150px;
}

@keyframes float{
    from{transform:translateY(0px);}
    to{transform:translateY(40px);}
}

header{
    position:fixed;
    top:0;
    width:100%;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:1000;
}

header h2{
    font-weight:800;
    letter-spacing:3px;
    color:#00f5ff;
}

header nav{
    display:flex;
    gap:25px;
}

header nav a{
    color:#fff;
    text-decoration:none;
    transition:0.3s;
}

header nav a:hover{
    color:#ff00c8;
}

.toggle-btn{
    display:none;
    width:35px;
    height:25px;
    position:relative;
    cursor:pointer;
    z-index:1100;
}

.toggle-btn span{
    position:absolute;
    width:100%;
    height:4px;
    background:linear-gradient(90deg,#00f5ff,#ff00c8);
    border-radius:5px;
    transition:0.4s ease;
}

.toggle-btn span:nth-child(1){
    top:0;
}
.toggle-btn span:nth-child(2){
    top:10px;
}
.toggle-btn span:nth-child(3){
    bottom:0;
}

.toggle-btn.active span:nth-child(1){
    transform:rotate(45deg);
    top:10px;
}

.toggle-btn.active span:nth-child(2){
    opacity:0;
}

.toggle-btn.active span:nth-child(3){
    transform:rotate(-45deg);
    bottom:11px;
}

@media(max-width:768px){
    .toggle-btn{
        display:block;
    }
}

@media(max-width:768px){
    header{
        padding:20px;
    }

    header nav{
        position:absolute;
        top:80px;
        right:-100%;
        flex-direction:column;
        background:rgba(0,0,0,0.9);
        width:200px;
        padding:20px;
        transition:0.4s;
        border-radius:10px;
    }

    header nav.show{
        right:20px;
    }

    .toggle-btn{
        display:block;
    }
}

.hero{
    text-align:center;
    margin-top:120px;
    margin-bottom:40px;
}

.hero h1{
    font-size:55px;
    font-weight:800;
    background:linear-gradient(90deg,#00f5ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    margin-top:15px;
    opacity:0.8;
    font-size:18px;
}


.stopWatch{
    padding:50px 60px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(0,255,255,0.3);
    text-align:center;
    transition:0.5s;
}

.stopWatch:hover{
    box-shadow:0 0 70px rgba(255,0,200,0.6);
}

.display{
    font-size:60px;
    letter-spacing:4px;
    margin-bottom:40px;
    text-shadow:0 0 20px #00f5ff;
}

.buttons{
    display:flex;
    gap:25px;
    justify-content:center;
}


button{
    width:70px;
    height:70px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    font-size:22px;
    color:#fff;
    background:rgba(255,255,255,0.1);
    transition:0.4s;
    display:flex;
    align-items:center;
    justify-content:center;
}

button:hover{
    transform:scale(1.2);
}


.unique-footer{
    margin-top:50px;
    padding:20px;
    text-align:center;
    font-size:14px;
    opacity:0.8;
}


@media(max-width:600px){
    .hero h1{ font-size:35px; }
    .display{ font-size:40px; }
    .stopWatch{ padding:30px; }
}
</style>
</head>
<body>

<header>
    <h2>STOPWATCH PRO</h2>
    <div class="toggle-btn" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
</div>
    <nav id="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="hero">
    <h1>Next Level Stopwatch</h1>
    <p>Developed By Future Titans Team</p>
</div>

<div class="stopWatch">
    <div class="display" id="display">00:00:00</div>
    <div class="buttons">
        <button id="stop"><i class="fa-solid fa-stop"></i></button>
        <button id="start"><i class="fa-solid fa-play"></i></button>
        <button id="reset"><i class="fa-solid fa-rotate-right"></i></button>
    </div>
</div>

<footer class="unique-footer">
    © <span id="year"></span> All Rights Reserved
</footer>

<script>
const display = document.getElementById("display");
const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const resetBtn = document.getElementById("reset");

let seconds = 0, minutes = 0, hours = 0;
let timer = null;
let isRunning = false;

function updateDisplay(){
    let h = hours < 10 ? "0" + hours : hours;
    let m = minutes < 10 ? "0" + minutes : minutes;
    let s = seconds < 10 ? "0" + seconds : seconds;
    display.textContent = `${h}:${m}:${s}`;
}

function stopwatch(){
    seconds++;
    if(seconds === 60){
        seconds = 0;
        minutes++;
        if(minutes === 60){
            minutes = 0;
            hours++;
        }
    }
    updateDisplay();
}

startBtn.addEventListener("click", function(){
    if(!isRunning){
        timer = setInterval(stopwatch, 1000);
        isRunning = true;
    }
});

stopBtn.addEventListener("click", function(){
    clearInterval(timer);
    isRunning = false;
});

resetBtn.addEventListener("click", function(){
    clearInterval(timer);
    seconds = minutes = hours = 0;
    isRunning = false;
    updateDisplay();
});

function toggleMenu(){
    document.getElementById("menu").classList.toggle("show");
    document.querySelector(".toggle-btn").classList.toggle("active");
}

document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
