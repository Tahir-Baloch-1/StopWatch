<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Stopwatch</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Orbitron', sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#0a0f1c;
    overflow:hidden;
    color:#fff;
}

/* Animated Background Circles */
body::before,
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.6;
    animation: float 10s infinite alternate ease-in-out;
}

body::before{
    background:#00f5ff;
    top:-150px;
    left:-150px;
}

body::after{
    background:#ff00c8;
    bottom:-150px;
    right:-150px;
}

@keyframes float{
    from{transform:translateY(0px);}
    to{transform:translateY(40px);}
}

/* Header */
header{
    position:absolute;
    top:0;
    width:100%;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

header h2{
    font-weight:800;
    letter-spacing:3px;
    color:#00f5ff;
}

header nav a{
    color:#fff;
    margin-left:25px;
    text-decoration:none;
    transition:0.3s;
}

header nav a:hover{
    color:#ff00c8;
}

/* Hero */
.hero{
    text-align:center;
    margin-bottom:40px;
    animation:fadeIn 1.5s ease;
}

.hero h1{
    font-size:55px;
    font-weight:800;
    background:linear-gradient(90deg,#00f5ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    margin-top:15px;
    opacity:0.8;
    font-size:18px;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* Stopwatch Card */
.stopWatch{
    position:relative;
    padding:50px 60px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(0,255,255,0.3);
    text-align:center;
    transition:0.5s;
}

.stopWatch:hover{
    box-shadow:0 0 70px rgba(255,0,200,0.6);
}

/* Time Display */
.display{
    font-size:60px;
    letter-spacing:4px;
    margin-bottom:40px;
    text-shadow:0 0 20px #00f5ff;
}

/* Buttons */
.buttons{
    display:flex;
    gap:25px;
    justify-content:center;
    align-items:center;
}

button{
    position:relative;
    width:70px;
    height:70px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    font-size:22px;
    color:#fff;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    transition:0.4s;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* Neon Ring Effect */
button::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    border:2px solid transparent;
    transition:0.4s;
}

#start::before{ border-color:#00ffae; }
#stop::before{ border-color:#ff0055; }
#reset::before{ border-color:#00c3ff; }

button:hover{
    transform:scale(1.2);
}

button:hover::before{
    box-shadow:0 0 25px currentColor;
}

/* Footer */
footer{
    position:absolute;
    bottom:15px;
    font-size:13px;
    opacity:0.6;
}

@media(max-width:600px){
    .hero h1{ font-size:35px; }
    .display{ font-size:40px; }
    .stopWatch{ padding:30px; }
}
.unique-footer {
  background: #0d0d0d;
  padding: 30px 15px;
  text-align: center;
  color: #fff;
  font-family: 'Segoe UI', sans-serif;
  border-top: 2px solid #00f7ff;
}

.app-name {
  font-size: 18px;
  color: #00f7ff;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.credit {
  font-size: 15px;
  margin-bottom: 8px;
}

.credit a {
  color: #00ffcc;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.credit a:hover {
  color: #ffffff;
  text-shadow: 0 0 8px #00ffcc;
}

.copyright {
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>
<body>

<header>
    <h2>STOPWATCH PRO</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="hero">
    <h1>Next Level Stopwatch</h1>
    <p>Ultra Modern Neon Glass UI Design</p>
</div>

<div class="stopWatch">
    <div class="display">00:00:00</div>
    <div class="buttons">
        <button id="stop" onclick="WatchStop()"><i class="fa-solid fa-stop"></i></button>
        <button id="start" onclick="startWatch()"><i class="fa-solid fa-play"></i></button>
        <button id="reset" onclick="ResetWatch()"><i class="fa-solid fa-rotate-right"></i></button>
    </div>
</div>

<footer class="unique-footer">
  <div class="footer-inner">
    <p class="app-name">⏱ Stopwatch App</p>
    
    <p class="credit">
      Crafted with precision by 
      <a href="https://yourportfolio.com" target="_blank">
        Tahir Baloch
      </a>
    </p>

    <p class="copyright">
        
      © <span id="year"></span> All Rights Reserved
    </p>
  </div>
</footer>



<script>
    document.getElementById("year").textContent = new Date().getFullYear();
    let [seconds, minutes, hours] = [0,0,0];
    let display = document.querySelector(".display");
    let timmer = null;
    let start = document.getElementById("start");
    let stop = document.getElementById("stop");

    function stopWatch(){
        seconds++;
        if(seconds == 60){
            seconds = 0;
            minutes++;
            if(minutes == 60){
                minutes = 0;
                hours++; 
            }
        }
        let h = hours < 10 ? "0" + hours : hours;
        let m = minutes < 10 ? "0" + minutes : minutes;
        let s = seconds < 10 ? "0" + seconds : seconds;


        display.innerHTML = h + ":" + m + ":" + s;
    }
    function startWatch(){
        if(timmer !== null){
            clearInterval(timmer);
        }
        timmer = setInterval(stopWatch,1000);
        start.innerHTML = `<i class="fa-solid fa-play"></i>`;
    }

    function WatchStop(){
        clearInterval(timmer);
        start.innerHTML = `<i class="fa-solid fa-circle-pause" id = "start" style="color: rgb(236, 235, 231);"></i>`;

    }
    function ResetWatch(){
        clearInterval(timmer);
        [seconds, minutes, hours] = [0,0,0];
        display.innerHTML = "00:00:00";
        start.innerHTML = `<i class="fa-solid fa-play"></i>`;
    }
</script>
</body>
</html>
